          type: string
          format: date-time
        toDate:
          type: string
          format: date-time
        tradeType:
          type: string
          enum: [vanilla_options, forex, multiplier, futures]
        mt5AccountId:
          type: ["string", "null"]
        duration:
          type: ["integer", "null"]
        durationUnit:
          type: ["string", "null"]
          enum: [t, s, m, h, d, null]
        initialBalance:
          type: ["number", "null"]
        stakePerTrade:
          type: ["number", "null"]
        granularitySec:
          type: ["integer", "null"]
          description: "Candle granularity in seconds for the backtest data (60=1m, 300=5m, 900=15m, 3600=1h, 14400=4h, 86400=1d). If null, auto-derived from durationUnit."
        sessions:
          type: ["array", "null"]
          items:
            type: string
            enum: [asian, london, newyork, overlap_london_ny]
          description: "Restrict the backtest to trades initiated within the given trading sessions (UTC). If null or empty, all sessions are included."
        datasetFile:
          type: ["string", "null"]
          description: "If provided, the backtest will run using this local CSV file instead of fetching from Deriv API."
        alternateDirection:
          type: boolean
          description: "If true, enforces strict alternation of signal directions during the backtest."
      required:
        - strategyId
        - symbol
        - fromDate
        - toDate

