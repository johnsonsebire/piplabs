
openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PipLabs Universal Trading Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management and roles
  - name: deriv
    description: Deriv API connection management
  - name: assets
    description: Deriv tradable assets
  - name: watchlist
    description: User watchlist
  - name: trades
    description: Trade management
  - name: strategies
    description: Trading strategies
  - name: indicators
    description: Custom indicators
  - name: backtests
    description: Strategy backtesting
  - name: ai
    description: AI trade analysis
  - name: guides
    description: Trading discipline guides
  - name: dashboard
    description: Dashboard summaries and analytics
  - name: market
    description: Market news and data
  - name: openai
    description: OpenAI AI chat and analysis operations
  - name: journals
    description: Manual trade journaling workspace

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Users ───────────────────────────────────────────────────────────────────

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin+)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [system, super_admin, admin, user]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a specific user (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user's role (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/permissions:
    get:
      operationId: getUserPermissions
      tags: [users]
      summary: Get permissions for a user (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissions"

    patch:
      operationId: updateUserPermissions
      tags: [users]
      summary: Update permissions for a user (admin+)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPermissionsUpdate"
      responses:
        "200":
          description: Updated permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissions"

  # ─── Deriv Connection ────────────────────────────────────────────────────────

  /deriv/connect:
    post:
      operationId: connectDeriv
      tags: [deriv]
      summary: Save Deriv API token for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DerivTokenInput"
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DerivStatus"

    delete:
      operationId: disconnectDeriv
      tags: [deriv]
      summary: Remove Deriv API token
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DerivStatus"

  /deriv/status:
    get:
      operationId: getDerivStatus
      tags: [deriv]
      summary: Check Deriv connection status
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DerivStatus"

  /deriv/active-symbols:
    get:
      operationId: searchDerivSymbols
      tags: [deriv]
      summary: Search Deriv active symbols (all tradeable instruments)
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: instrumentType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Matching symbols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DerivActiveSymbol"

  # ─── MT5 Accounts ────────────────────────────────────────────────────────────

  /mt5-accounts:
    get:
      operationId: listMt5Accounts
      tags: [mt5]
      summary: List all MT5 accounts for current user
      responses:
        "200":
          description: List of MT5 accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mt5Account"

    post:
      operationId: createMt5Account
      tags: [mt5]
      summary: Create a new MT5 account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Mt5AccountInput"
      responses:
        "201":
          description: Created MT5 account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mt5Account"

  /mt5-accounts/{id}:
    delete:
      operationId: deleteMt5Account
      tags: [mt5]
      summary: Delete/remove an MT5 account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Account deleted successfully
        "401":
          description: Unauthorized
        "404":
          description: Account not found
        "500":
          description: Internal server error

  /mt5-accounts/{id}/provider:
    post:
      operationId: setMt5AccountProvider
      tags: [mt5]
      summary: Set MT5 account as a Provider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mt5Account"

  # ─── Assets ──────────────────────────────────────────────────────────────────

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List all available Deriv available assets with human-readable names
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [forex, vanilla_options, multiplier, all]
        - name: search
          in: query
          schema:
            type: string
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"

    post:
      operationId: createAsset
      tags: [assets]
      summary: Add a new asset to the local database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetInput"
      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"

  /assets/{symbol}:
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get a single asset by symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Asset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        "404":
          description: Not found

  /assets/popular:
    get:
      operationId: getPopularAssets
      tags: [assets]
      summary: Get most watched and traded assets
      responses:
        "200":
          description: Popular assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"

  # ─── Watchlist ───────────────────────────────────────────────────────────────

  /watchlist:
    get:
      operationId: getWatchlist
      tags: [watchlist]
      summary: Get current user's watchlist
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"

    post:
      operationId: addToWatchlist
      tags: [watchlist]
      summary: Add asset to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistItemInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistItem"

  /watchlist/{symbol}:
    delete:
      operationId: removeFromWatchlist
      tags: [watchlist]
      summary: Remove asset from watchlist
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  # ─── Trading Guides ──────────────────────────────────────────────────────────

  /guides:
    get:
      operationId: listGuides
      tags: [guides]
      summary: List all trading guides for the current user
      responses:
        "200":
          description: A list of trading guides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradingGuide"
        "401":
          description: Unauthorized

    post:
      operationId: createGuide
      tags: [guides]
      summary: Create a new trading guide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradingGuideInput"
      responses:
        "201":
          description: Guide created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingGuide"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /guides/{id}:
    put:
      operationId: updateGuide
      tags: [guides]
      summary: Update a trading guide
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradingGuideInput"
      responses:
        "200":
          description: Guide updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingGuide"
        "404":
          description: Guide not found
        "401":
          description: Unauthorized

    delete:
      operationId: deleteGuide
      tags: [guides]
      summary: Delete a trading guide
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Guide deleted
        "404":
          description: Guide not found
        "401":
          description: Unauthorized

  # ─── Trades ──────────────────────────────────────────────────────────────────

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List trades
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, cancelled, pending]
        - name: type
          in: query
          schema:
            type: string
            enum: [vanilla_options, forex, multiplier, futures]
        - name: symbol
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of trades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeList"

    post:
      operationId: createTrade
      tags: [trades]
      summary: Open a new trade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeInput"
      responses:
        "201":
          description: Trade opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"

  /trades/recent:
    get:
      operationId: getRecentTrades
      tags: [trades]
      summary: Get recent trade activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/stats:
    get:
      operationId: getTradeStats
      tags: [trades]
      summary: Trading statistics by type, asset, and period
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month, all]
      responses:
        "200":
          description: Trade statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeStats"

  /trades/{id}:
    get:
      operationId: getTrade
      tags: [trades]
      summary: Get a specific trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Not found

    patch:
      operationId: updateTrade
      tags: [trades]
      summary: Update trade (target profit, notes, strategy)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeUpdate"
      responses:
        "200":
          description: Updated trade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"

    delete:
      operationId: closeTrade
      tags: [trades]
      summary: Close or cancel a trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"

  /trades/{id}/logs:
    get:
      operationId: listTradeLogs
      tags: [trades]
      summary: Get logs for a trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeLog"

    post:
      operationId: addTradeLog
      tags: [trades]
      summary: Add a log entry to a trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeLogInput"
      responses:
        "201":
          description: Log added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeLog"

  /trades/{id}/comments:
    get:
      operationId: listTradeComments
      tags: [trades]
      summary: Get comments on a trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeComment"

    post:
      operationId: addTradeComment
      tags: [trades]
      summary: Add a comment to a trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeCommentInput"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeComment"

  /trades/{id}/comments/{commentId}:
    delete:
      operationId: deleteTradeComment
      tags: [trades]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Strategies ──────────────────────────────────────────────────────────────

  /strategies:
    get:
      operationId: listStrategies
      tags: [strategies]
      summary: List all strategies
      responses:
        "200":
          description: Strategies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strategy"

    post:
      operationId: createStrategy
      tags: [strategies]
      summary: Create a new strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyInput"
      responses:
        "201":
          description: Strategy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"

  /strategies/{id}:
    get:
      operationId: getStrategy
      tags: [strategies]
      summary: Get a specific strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Strategy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
        "404":
          description: Not found

    patch:
      operationId: updateStrategy
      tags: [strategies]
      summary: Update a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyUpdate"
      responses:
        "200":
          description: Updated strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"

    delete:
      operationId: deleteStrategy
      tags: [strategies]
      summary: Delete a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Indicators ──────────────────────────────────────────────────────────────

  /indicators:
    get:
      operationId: listIndicators
      tags: [indicators]
      summary: List all custom indicators
      responses:
        "200":
          description: Indicators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Indicator"

    post:
      operationId: createIndicator
      tags: [indicators]
      summary: Create a custom indicator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndicatorInput"
      responses:
        "201":
          description: Indicator created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indicator"

  /indicators/{id}:
    get:
      operationId: getIndicator
      tags: [indicators]
      summary: Get a specific indicator
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Indicator details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indicator"

    patch:
      operationId: updateIndicator
      tags: [indicators]
      summary: Update an indicator
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndicatorUpdate"
      responses:
        "200":
          description: Updated indicator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Indicator"

    delete:
      operationId: deleteIndicator
      tags: [indicators]
      summary: Delete an indicator
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Datasets ────────────────────────────────────────────────────────────────

  /datasets/backtests:
    get:
      operationId: listBacktestDatasets
      tags: [datasets]
      summary: List available CSV datasets for backtesting
      responses:
        "200":
          description: List of dataset filenames
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /datasets/backtests/upload:
    post:
      operationId: uploadBacktestDataset
      tags: [datasets]
      summary: Upload a new CSV dataset for backtesting
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadDatasetInput"
      responses:
        "200":
          description: Dataset uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  filename:
                    type: string
                  success:
                    type: boolean
                required:
                  - filename
                  - success

  # ─── Backtests ───────────────────────────────────────────────────────────────

  /backtests:
    get:
      operationId: listBacktests
      tags: [backtests]
      summary: List all backtest runs
      parameters:
        - name: strategyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Backtests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Backtest"

    post:
      operationId: runBacktest
      tags: [backtests]
      summary: Run a strategy backtest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestInput"
      responses:
        "201":
          description: Backtest started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backtest"

  /strategies/{id}/webhook/test:
    post:
      operationId: testStrategyWebhook
      tags: [strategies]
      summary: Send a sample signal payload to the strategy webhook URL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Webhook test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  status:
                    type: ["integer", "null"]
                  error:
                    type: ["string", "null"]
                required: [ok]

  /backtests/{id}:
    get:
      operationId: getBacktest
      tags: [backtests]
      summary: Get backtest result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backtest"
    delete:
      operationId: deleteBacktest
      tags: [backtests]
      summary: Delete a backtest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Backtest deleted

  # ─── AI Analysis ─────────────────────────────────────────────────────────────

  /ai/analyze:
    post:
      operationId: analyzeWithAI
      tags: [ai]
      summary: AI trade analysis using chart screenshot and indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAnalysisInput"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysis"

  /ai/analyze-trend:
    post:
      operationId: analyzeMultiTimeframeTrend
      tags: [ai]
      summary: AI trend confirmation across multiple timeframes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiTimeframeTrendInput"
      responses:
        "200":
          description: AI multi-timeframe trend result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiTimeframeTrendOutput"

  /ai/analyses:
    get:
      operationId: listAIAnalyses
