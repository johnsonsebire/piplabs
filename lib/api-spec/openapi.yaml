        - name: symbol
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of AI analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AIAnalysis"

  # ─── Auto Trading ────────────────────────────────────────────────────────────

  /autotrade/sessions:
