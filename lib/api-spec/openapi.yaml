      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutoTradeSession"

    post:
      operationId: createAutoTradeSession
      tags: [autotrade]
      summary: Start a new auto trading session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoTradeSessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTradeSession"

  /autotrade/sessions/{id}:
    patch:
      operationId: updateAutoTradeSession
      tags: [autotrade]
      summary: Update auto trading session status (pause/stop/resume)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoTradeSessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoTradeSession"

    delete:
      operationId: deleteAutoTradeSession
      tags: [autotrade]
      summary: Delete auto trading session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Dashboard ───────────────────────────────────────────────────────────────

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary - P&L, win rate, active trades, account balance
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── Market ──────────────────────────────────────────────────────────────────

  /market/news:
    get:
      operationId: getMarketNews
      tags: [market]
      summary: Get real market news for intraday trading
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [forex, crypto, stocks, commodities, general]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Market news articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsArticle"

  # ─── Scanner ──────────────────────────────────────────────────────────────────

  /scanner/alert:
    post:
      operationId: sendScannerAlert
      tags: [scanner]
      summary: Send a market scanner alert (triggering webhooks and emails)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScannerAlertInput"
      responses:
        "200":
          description: Alert dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  results:
                    type: object

  # ─── OpenAI ──────────────────────────────────────────────────────────────────

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /openai/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [openai]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiImageInput"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiImageOutput"



  /journals/workspaces:
    get:
      operationId: listJournalWorkspaces
      tags: [journals]
      summary: List all journal workspaces
      responses:
        "200":
          description: A list of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalWorkspace"
        "401":
          description: Unauthorized
    post:
      operationId: createJournalWorkspace
      tags: [journals]
      summary: Create a new journal workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalWorkspaceInput"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalWorkspace"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /journals/workspaces/{id}:
    patch:
      operationId: updateJournalWorkspace
      tags: [journals]
      summary: Update a journal workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalWorkspaceUpdate"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalWorkspace"
        "404":
          description: Not found
        "401":
          description: Unauthorized
    delete:
      operationId: deleteJournalWorkspace
      tags: [journals]
      summary: Delete a journal workspace
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Workspace deleted
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /journals:
    get:
      operationId: listJournals
      tags: [journals]
      summary: List all journal entries
      parameters:
        - name: accountName
          in: query
          schema:
            type: string
        - name: symbol
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournal
      tags: [journals]
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Created journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journals/bulk:
    post:
      operationId: importJournals
      tags: [journals]
      summary: Bulk import journal entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/JournalEntryInput"
      responses:
        "201":
          description: Imported journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"

  /journals/stats:
    get:
      operationId: getJournalStats
      tags: [journals]
      summary: Get journal statistics and metrics
      parameters:
        - name: accountName
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Journal stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalStats"

  /journals/{id}:
    get:
      operationId: getJournal
      tags: [journals]
      summary: Get a single journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
    patch:
      operationId: updateJournal
      tags: [journals]
      summary: Update a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalEntryUpdate"
      responses:
        "200":
          description: Updated journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
    delete:
      operationId: deleteJournal
      tags: [journals]
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully

components:
  schemas:
    ScannerAlertInput:
      type: object
      properties:
        signal:
          type: object
          description: "The trading signal that triggered the alert."
          additionalProperties: true
        payload:
          type: object
          description: "Optional custom payload structure for the webhook."
          additionalProperties: true
      required:
        - signal

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Users ──────────────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:
          type: string
        clerkId:
          type: string
        email:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [system, super_admin, admin, user]
        isActive:
          type: boolean
        derivConnected:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
        preferredTradeMode:
          type: string
          enum: [demo, live]
        openAiApiKey:
          type: ["string", "null"]
        scannerWebhookUrl:
          type: ["string", "null"]
        scannerEmailAlerts:
          type: boolean
        scannerSoundAlerts:
          type: boolean
        scannerCooldown:
          type: integer
        scannerAiConfirmation:
          type: boolean
      required:
        - id
        - clerkId
        - email
        - role
        - isActive
        - derivConnected
        - createdAt

    UserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    UserProfileUpdate:
      type: object
      properties:
        displayName:
          type: string
        preferredTradeMode:
          type: string
          enum: [demo, live]
        openAiApiKey:
          type: ["string", "null"]
        scannerWebhookUrl:
          type: ["string", "null"]
        scannerEmailAlerts:
          type: boolean
        scannerSoundAlerts:
          type: boolean
        scannerCooldown:
          type: integer
        scannerAiConfirmation:
          type: boolean

    UserRoleUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [super_admin, admin, user]
        isActive:
          type: boolean
      required:
        - role

    UserPermissions:
      type: object
      properties:
        userId:
          type: string
        canTrade:
          type: boolean
        canViewAllTrades:
          type: boolean
        canManageUsers:
          type: boolean
        canManageStrategies:
          type: boolean
        canRunBacktests:
          type: boolean
        canUseAI:
          type: boolean
        canAccessMarketData:
          type: boolean
        canManageIndicators:
          type: boolean
        canExportData:
          type: boolean
        canViewAnalytics:
          type: boolean
      required:
        - userId
        - canTrade
        - canViewAllTrades
        - canManageUsers
        - canManageStrategies
        - canRunBacktests
        - canUseAI
        - canAccessMarketData
        - canManageIndicators
        - canExportData
        - canViewAnalytics

    UserPermissionsUpdate:
      type: object
      properties:
        canTrade:
          type: boolean
        canViewAllTrades:
          type: boolean
        canManageUsers:
          type: boolean
        canManageStrategies:
          type: boolean
        canRunBacktests:
          type: boolean
        canUseAI:
          type: boolean
        canAccessMarketData:
          type: boolean
        canManageIndicators:
          type: boolean
        canExportData:
          type: boolean
        canViewAnalytics:
          type: boolean

    # ─── Deriv ──────────────────────────────────────────────────────────────────

    DerivTokenInput:
      type: object
      properties:
        apiToken:
          type: string
        appId:
          type: ["string", "null"]
        accountId:
          type: ["string", "null"]
      required:
        - apiToken

    DerivStatus:
      type: object
      properties:
        connected:
          type: boolean
        appId:
          type: ["string", "null"]
        accountId:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        balance:
          type: ["number", "null"]
        loginId:
          type: ["string", "null"]
        connectedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - connected

    # ─── MT5 Accounts ───────────────────────────────────────────────────────────

    Mt5Account:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        login:
          type: string
        server:
          type: string
        name:
          type: string
        broker:
          type: string
        type:
          type: string
          enum: [demo, live]
        isProvider:
          type: boolean
        state:
          type: string
          enum: [deployed, undeployed]
        connectionStatus:
          type: string
          enum: [connected, disconnected, error]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - login
        - server
        - name
        - broker
        - type
        - isProvider
        - state
        - connectionStatus
        - createdAt
        - updatedAt

    Mt5AccountInput:
      type: object
      properties:
        name:
          type: string
        login:
          type: string
        password:
          type: string
        server:
          type: string
        type:
          type: string
          enum: [demo, live]
      required:
        - name
        - login
        - password
        - server

    # ─── Assets ─────────────────────────────────────────────────────────────────

    Asset:
      type: object
      properties:
        symbol:
          type: string
        displayName:
          type: string
        shortName:
          type: string
        type:
          type: string
          enum: [forex, vanilla_options, multiplier, crypto, indices, commodities]
        subtype:
          type: ["string", "null"]
        isActive:
          type: boolean
        pipSize:
          type: ["number", "null"]
        minStake:
          type: ["number", "null"]
        maxStake:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        watchCount:
          type: integer
      required:
        - symbol
        - displayName
        - shortName
        - type
        - isActive
        - watchCount

    # ─── Watchlist ──────────────────────────────────────────────────────────────

    WatchlistItem:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        displayName:
          type: string
        type:
          type: string
        addedAt:
          type: string
          format: date-time
      required:
        - id
        - symbol
        - displayName
        - type
        - addedAt

    WatchlistItemInput:
      type: object
      properties:
        symbol:
          type: string
      required:
        - symbol

    # ─── Trades ─────────────────────────────────────────────────────────────────

    Trade:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        symbol:
          type: string
        displayName:
          type: string
        type:
          type: string
          enum: [vanilla_options, forex, multiplier, futures]
        direction:
          type: string
          enum: [buy, sell, call, put]
        stake:
          type: number
        targetProfit:
          type: ["number", "null"]
        currentProfit:
          type: ["number", "null"]
        entryPrice:
          type: ["number", "null"]
        exitPrice:
          type: ["number", "null"]
        status:
          type: string
          enum: [open, closed, cancelled, pending, closing]
        contractId:
          type: ["string", "null"]
        strategyId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        aiConfirmed:
          type: boolean
        openedAt:
          type: string
          format: date-time
        mt5AccountId:
          type: ["string", "null"]
        closedAt:
          type: ["string", "null"]
          format: date-time
        duration:
          type: ["integer", "null"]
        durationUnit:
          type: ["string", "null"]
        mode:
          type: string
          enum: [demo, live]
      required:
        - id
        - userId
        - symbol
        - displayName
        - type
        - direction
        - stake
        - status
        - aiConfirmed
        - openedAt
        - mode

    TradeList:
      type: object
      properties:
        trades:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - trades
        - total
        - page
        - limit

    TradeInput:
      type: object
      properties:
        symbol:
          type: string
        type:
          type: string
          enum: [vanilla_options, forex, multiplier, futures]
        direction:
          type: string
          enum: [buy, sell, call, put]
        stake:
          type: number
        targetProfit:
          type: ["number", "null"]
        strategyId:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        duration:
          type: ["integer", "null"]
        durationUnit:
          type: ["string", "null"]
        aiConfirmed:
          type: boolean
        mode:
          type: string
          enum: [demo, live]
        mt5AccountId:
          type: ["string", "null"]
          description: "ID of the MT5 account to use for forex trades via MetaApi"
        barrier:
          type: ["string", "null"]
          description: >
            Strike/barrier for vanilla options. Use "+0.00" for at-the-money,
            "+N" / "-N" for relative pips from spot, or an absolute price string.
            Required for VANILLALONGCALL / VANILLALONGPUT contract types.
        multiplier:
          type: ["number", "null"]
          description: >
            Multiplier value. Used only for Multiplier trade types. Acceptable values: 40, 100, 200, 300, 400.
      required:
        - symbol
        - type
        - direction
        - stake
        - aiConfirmed

    TradeUpdate:
      type: object
      properties:
        targetProfit:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        strategyId:
          type: ["integer", "null"]

    TradeStats:
      type: object
      properties:
        totalTrades:
          type: integer
        winRate:
          type: number
        totalPnl:
          type: number
        totalStake:
          type: number
        averageProfit:
          type: number
        byType:
          type: array
          items:
            $ref: "#/components/schemas/StatByType"
        byAsset:
          type: array
          items:
            $ref: "#/components/schemas/StatByAsset"
        dailyPnl:
          type: array
          items:
            $ref: "#/components/schemas/DailyPnl"
      required:
        - totalTrades
        - winRate
        - totalPnl
        - totalStake
        - averageProfit
        - byType
        - byAsset
        - dailyPnl

    StatByType:
      type: object
      properties:
        type:
          type: string
        count:
          type: integer
        pnl:
          type: number
        winRate:
          type: number
      required:
        - type
        - count
        - pnl
        - winRate

    StatByAsset:
      type: object
      properties:
        symbol:
          type: string
        displayName:
          type: string
        count:
          type: integer
        pnl:
          type: number
      required:
        - symbol
        - displayName
        - count
        - pnl

    DailyPnl:
      type: object
      properties:
        date:
          type: string
        pnl:
          type: number
        trades:
          type: integer
      required:
        - date
        - pnl
        - trades

    TradeLog:
      type: object
      properties:
        id:
          type: integer
        tradeId:
          type: integer
        level:
          type: string
          enum: [info, warning, error, success]
        message:
